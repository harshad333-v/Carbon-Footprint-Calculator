<!DOCTYPE html>
<html>
<head>
<title>Carbon Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: url('https://cefic.org/app/uploads/2024/05/shutterstock_2194842335-scaled-1-jpg.webp') no-repeat center center/cover;
    font-family: Arial;
    overflow-x: hidden;
}

.overlay {
    background: rgba(0,0,0,0.5);
    min-height: 100vh;
}

.main-card {
    background: #ffffff;
    border-radius: 15px;
    padding: 25px;
    margin-top: 40px;
}

.left-section {
    border-right: 1px solid #ddd;
}

.btn-custom {
    background: #0d6efd;
    color: white;
}

.btn-custom:hover {
    background: #084298;
}

.big-number {
    font-size: 32px;
    font-weight: bold;
    color: green;
}

/* FIX: chart size */
.chart-container {
    width: 280px;
    height: 280px;
    margin: auto;
}

/* FIX: tips scroll */
#tips {
    max-height: 200px;
    overflow-y: auto;
}

/* FIX: result box */
.result-box {
    max-width: 100%;
    overflow: hidden;
}
</style>

</head>

<body>

<div class="overlay">

<div class="container">
<div class="row justify-content-center">

<div class="col-lg-9 col-md-11">

<div class="main-card shadow">

<div class="row">

<!-- LEFT SIDE -->
<div class="col-md-6 left-section">

<h4>🌍 Calculate Your Carbon Footprint</h4>
<p class="text-muted">Enter your daily usage</p>

<form onsubmit="event.preventDefault(); calculate();">

<input id="travel" type="number" class="form-control mb-3" placeholder="Travel (km/day)" required>

<input id="electricity" type="number" class="form-control mb-3" placeholder="Electricity (units/month)" required>

<select id="transport" class="form-select mb-3">
<option value="car">🚗 Car</option>
<option value="bike">🏍 Bike</option>
<option value="bus">🚌 Bus</option>
<option value="train">🚆 Train</option>
<option value="flight">✈️ Flight</option>
</select>

<select id="diet" class="form-select mb-3">
<option value="veg">Vegetarian</option>
<option value="nonveg">Non-Vegetarian</option>
</select>

<button class="btn btn-custom w-100">Calculate</button>

</form>

</div>

<!-- RIGHT SIDE -->
<div class="col-md-6 text-center result-box">

<h5>Your Carbon Footprint</h5>

<div style="margin-top: 10px;">
<h1 id="result" class="big-number">--</h1>
<p id="level" class="text-muted"></p>
</div>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

<hr>

<ul id="tips" class="list-group mt-3"></ul>

<p id="fact" class="mt-3"></p>

</div>

</div>

</div>

</div>

</div>
</div>

</div>

<script>
let chart;

async function calculate() {

    let data = {
        travel: document.getElementById("travel").value,
        electricity: document.getElementById("electricity").value,
        transport: document.getElementById("transport").value,
        diet: document.getElementById("diet").value
    };

    let res = await fetch("/calculate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    let result = await res.json();

    // Update UI
    document.getElementById("result").innerText = result.footprint + " kg CO₂";
    document.getElementById("level").innerText = result.level;
    document.getElementById("fact").innerText = result.fact;

    // Tips
    let tipsHTML = "";
    result.tips.forEach(t => {
        tipsHTML += `<li class="list-group-item">${t}</li>`;
    });
    document.getElementById("tips").innerHTML = tipsHTML;

    // Chart fix
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type: 'doughnut',
        data: {
            labels: ['Travel','Electricity','Diet'],
            datasets: [{
                data: [result.travel, result.electricity, result.diet]
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}
</script>

</body>
</html>
